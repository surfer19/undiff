services:
  # ── Infrastructure ──────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: sage-db
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: next_review
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  smee:
    image: node:22-alpine
    container_name: sage-smee
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - npx smee-client@5 --url "$$SMEE_URL" --target http://api:4000/webhooks/github
    environment:
      SMEE_URL: ${SMEE_URL:-https://smee.io/new}

  # ── Database migration (runs once then exits) ──────────────────
  migrate:
    build:
      context: .
      target: migrate
    container_name: sage-migrate
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/next_review
    depends_on:
      postgres:
        condition: service_healthy

  # ── API server ─────────────────────────────────────────────────
  api:
    build:
      context: .
      target: api
    container_name: sage-api
    ports:
      - '4000:4000'
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/next_review
      HOST: 0.0.0.0
      PORT: '4000'
      GITHUB_PRIVATE_KEY_PATH: /run/secrets/github-pem
    volumes:
      - ./private-key.pem:/run/secrets/github-pem:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4000/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5

  # ── Web dashboard (Vite dev server) ────────────────────────────
  web:
    build:
      context: .
      target: web
    container_name: sage-web
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://api:4000
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
