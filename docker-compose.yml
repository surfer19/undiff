services:
  postgres:
    image: postgres:17-alpine
    container_name: sage-db
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: next_review
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  smee:
    image: node:22-alpine
    container_name: sage-smee
    restart: unless-stopped
    entrypoint:
      - sh
      - -c
      - npx smee-client@5 --url "$$SMEE_URL" --target http://host.containers.internal:$$TARGET_PORT/webhooks/github
    environment:
      SMEE_URL: ${SMEE_URL:-https://smee.io/new}
      TARGET_PORT: ${PORT:-4000}
    profiles:
      - tunnel

volumes:
  pgdata:
