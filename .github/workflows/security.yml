name: "Security"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 06:00 UTC to catch new advisories
    - cron: "0 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═════════════════════════════════════════════════════════════════════════
  # Dependency Audit — pnpm audit for known CVEs
  # ═════════════════════════════════════════════════════════════════════════
  dependency-audit:
    name: "Security / dependency-audit"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit dependencies (high + critical)
        run: pnpm audit --audit-level=high

  # ═════════════════════════════════════════════════════════════════════════
  # CodeQL — GitHub's free SAST (static analysis security testing)
  # ═════════════════════════════════════════════════════════════════════════
  codeql:
    name: "Security / CodeQL (${{ matrix.language }})"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
